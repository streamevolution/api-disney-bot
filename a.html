<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Disney+</title>
    <style>
        /* Paleta de colores estilo Disney+ */
        body {
            background-color: #1a1d29; /* Fondo azul oscuro */
            color: #f9f9f9;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2b2e40;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-bottom: 5px;
            font-weight: 600;
        }
        p {
            color: #cacaca;
            font-size: 14px;
            margin-bottom: 25px;
        }
        input[type="email"] {
            width: 90%;
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid #4b4e5c;
            background-color: #3b3e50;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }
        input[type="email"]:focus {
            border-color: #0072d2;
        }
        button {
            background-color: #0072d2; /* Azul Disney */
            color: white;
            border: none;
            padding: 14px 20px;
            width: 100%;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #005bb5;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        .result-box {
            margin-top: 25px;
            text-align: left;
        }
        textarea {
            width: 100%;
            height: 120px;
            background-color: #1a1d29;
            color: #00e676; /* Letra verde tipo consola para destacar el código */
            border: 1px solid #4b4e5c;
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            resize: none;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Recuperar Código</h2>
        <p>Busca el último código de acceso de Disney+</p>
        
        <input type="email" id="emailInput" placeholder="Correo receptor" required>
        <button id="btnBuscar" onclick="buscarCodigo()">Obtener Código</button>

        <div class="result-box">
            <textarea id="resultado" readonly placeholder="El código o mensaje aparecerá aquí..."></textarea>
        </div>
    </div>

    <script>
        async function buscarCodigo() {
            const email = document.getElementById('emailInput').value;
            const textarea = document.getElementById('resultado');
            const boton = document.getElementById('btnBuscar');
            
            if(!email) {
                alert("Por favor ingresa un correo.");
                return;
            }

            // Estado de carga
            textarea.value = "Conectando al servidor y buscando en la bandeja de entrada...\nPor favor espera...";
            boton.disabled = true;
            boton.innerText = "Buscando...";

            try {
                // RECUERDA CAMBIAR ESTA URL POR LA QUE TE DÉ RAILWAY
                const urlRailway = 'https://tu-app-en-railway.up.railway.app/buscar-correo'; 
                
                const response = await fetch(urlRailway, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email_usuario: email })
                });

                const data = await response.json();

                if (data.success) {
                    textarea.value = "¡Código encontrado!\n\n" + data.codigo; 
                } else {
                    textarea.value = "Resultado:\n" + (data.mensaje || data.error);
                }
            } catch (error) {
                textarea.value = "Error de red. Asegúrate de que tu servidor en Railway esté encendido y la URL sea correcta.";
            } finally {
                // Restaurar botón
                boton.disabled = false;
                boton.innerText = "Obtener Código";
            }
        }
    </script>
</body>
</html>
