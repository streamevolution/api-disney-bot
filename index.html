<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel StreamEvolution</title>
    <style>
        /* Paleta de colores Premium */
        body {
            background-color: #0f1014; /* Fondo aún más oscuro y elegante */
            color: #f9f9f9;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1a1d29;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
        }
        h2 {
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #0072d2, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #8f98b2;
            font-size: 14px;
            margin-bottom: 30px;
        }
        input[type="email"] {
            width: 90%;
            padding: 14px 15px;
            border-radius: 8px;
            border: 1px solid #3b3e50;
            background-color: #13151d;
            color: white;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
            transition: border 0.3s;
        }
        input[type="email"]:focus {
            border-color: #0072d2;
        }
        button {
            background: linear-gradient(90deg, #0072d2, #005bb5);
            color: white;
            border: none;
            padding: 15px 20px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 114, 210, 0.4);
        }
        
        /* Caja donde se muestra el resultado final */
        .result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #13151d;
            border-radius: 8px;
            border: 1px solid #2b2e40;
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .result-text {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #00e676; /* Verde éxito */
        }
        .result-error {
            font-size: 14px;
            color: #ff5252; /* Rojo error */
            letter-spacing: normal;
        }

        /* DISEÑO DE LA VENTANA DE CARGA (MODAL) */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 16, 20, 0.85);
            backdrop-filter: blur(8px); /* Efecto cristalino/borroso en el fondo */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #0072d2;
            border-radius: 50%;
            animation: girar 1s linear infinite;
            margin-bottom: 20px;
        }
        .overlay p {
            color: white;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
            margin: 0;
        }

        @keyframes girar {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loadingModal" class="overlay">
        <div class="spinner"></div>
        <p>Generando acceso...</p>
    </div>

    <div class="container">
        <h2>Panel StreamEvolution</h2>
        <p>Gestor de Accesos Disney+</p>
        
        <input type="email" id="emailInput" placeholder="Correo del cliente (ej. juan+3@...)" required>
        <button onclick="buscarCodigo()">Obtener Código</button>

        <div class="result-box">
            <span id="resultadoTexto" style="color: #666; font-size: 14px;">El código aparecerá aquí</span>
        </div>
    </div>

    <script>
        async function buscarCodigo() {
            const email = document.getElementById('emailInput').value;
            const resultadoSpan = document.getElementById('resultadoTexto');
            const modal = document.getElementById('loadingModal');
            
            if(!email) {
                alert("Por favor ingresa un correo electrónico válido.");
                return;
            }

            // 1. Mostrar la pantalla de carga elegante
            modal.classList.add('active');
            
            // Limpiar resultados anteriores
            resultadoSpan.className = "";
            resultadoSpan.style.color = "";
            resultadoSpan.innerText = "";

            try {
                // Tu enlace de Railway ya configurado
                const urlRailway = 'https://api-disney-bot-production.up.railway.app/buscar-correo'; 
                
                const response = await fetch(urlRailway, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email_usuario: email })
                });

                const data = await response.json();

                // 2. Ocultar la pantalla de carga
                modal.classList.remove('active');

                // 3. Mostrar el resultado bonito
                if (data.success) {
                    // Verificamos si es un error disfrazado de éxito (ej. "No se encontraron...")
                    if(data.codigo.includes("No se") || data.codigo.includes("Solo se")) {
                        resultadoSpan.classList.add('result-error');
                        resultadoSpan.innerText = data.codigo;
                    } else {
                        resultadoSpan.classList.add('result-text');
                        resultadoSpan.innerText = data.codigo; 
                    }
                } else {
                    resultadoSpan.classList.add('result-error');
                    resultadoSpan.innerText = data.mensaje || data.error;
                }
            } catch (error) {
                modal.classList.remove('active');
                resultadoSpan.classList.add('result-error');
                resultadoSpan.innerText = "Error de red. Verifica tu conexión.";
            }
        }
    </script>
</body>
</html>
