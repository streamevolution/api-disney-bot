<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* BASE FLAT DESIGN */
        body {
            background-color: #0f172a; /* Fondo oscuro sólido y elegante */
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .panel {
            background-color: #1e293b; /* Tarjeta sólida sin degradados */
            padding: 40px 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h2 {
            margin: 0 0 5px 0;
            font-weight: 600;
            font-size: 24px;
            color: #f1f5f9;
            text-align: center;
        }
        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
            text-align: center;
        }
        
        /* FORMULARIOS Y LISTAS DESPLEGABLES */
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 13px;
            color: #cbd5e1;
            margin-bottom: 6px;
            font-weight: 500;
        }
        select, input[type="email"] {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 12px;
            background-color: #334155; 
            border: 1px solid #475569;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
            appearance: none; /* Estilo plano puro */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }
        /* El input email no ocupa la flecha del select */
        input[type="email"] { background-image: none; }
        
        select:focus, input[type="email"]:focus {
            border-color: #3b82f6; 
        }
        
        /* BOTÓN PLANO */
        button {
            width: 100%;
            padding: 14px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
            font-family: 'Inter', sans-serif;
        }
        button:hover {
            background-color: #2563eb;
        }

        /* CAJA DE RESULTADO (COPIADA DE TU ARCHIVO) */
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #0f172a;
            border-radius: 8px;
            border: 1px solid #334155;
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            word-break: break-all;
        }
        .result-text { font-size: 26px; font-weight: 600; letter-spacing: 2px; color: #10b981; }
        .result-error { font-size: 14px; color: #ef4444; }
        .btn-enlace-final {
            background-color: #10b981;
            color: #000;
            padding: 10px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 10px;
            display: inline-block;
        }

        /* OVERLAY SPINNER (COPIADO DE TU ARCHIVO) */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #334155;
            border-top-color: #3b82f6; border-radius: 50%; animation: girar 1s linear infinite; margin-bottom: 15px;
        }
        .overlay p { color: white; font-size: 15px; margin: 0; font-weight: 500; }
        @keyframes girar { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingModal" class="overlay">
        <div class="spinner"></div>
        <p id="textoCarga">Procesando...</p>
    </div>

    <div class="panel">
        <h2>Panel de Control</h2>
        <p class="subtitle">Selecciona plataforma</p>
        
        <div class="form-group">
            <label for="plataformaSelect">Plataforma</label>
            <select id="plataformaSelect" onchange="actualizarOpciones()">
                <option value="disney">Disney+</option>
                <option value="vix">ViX</option>
                <option value="max">Max / HBO</option>
                <option value="prime">Prime Video</option>
            </select>
        </div>

        <div class="form-group">
            <label for="accionSelect">Acción requerida</label>
            <select id="accionSelect">
                </select>
        </div>

        <div class="form-group">
            <label for="emailInput">Correo asignado</label>
            <input type="email" id="emailInput" placeholder="Ej. juan+3@gmail.com" required>
        </div>

        <button onclick="ejecutarAccion()">Continuar</button>

        <div class="result-box" id="cajaResultado">
            <span style="color: #64748b; font-size: 14px;">El resultado aparecerá aquí</span>
        </div>
    </div>

    <script>
        // 1. DICCIONARIO DE OPCIONES PARA LA LISTA 2
        const opciones = {
            'disney': [
                { texto: 'Código de Acceso', valor: 'acceso_disney' },
                { texto: 'Código de Hogar', valor: 'hogar_disney' }
            ],
            'vix': [
                { texto: 'Cambiar contraseña', valor: 'pass_vix' }
            ],
            'max': [
                { texto: 'Próximamente...', valor: 'none' }
            ],
            'prime': [
                { texto: 'Próximamente...', valor: 'none' }
            ]
        };

        // 2. FUNCIÓN PARA ACTUALIZAR LA LISTA 2 CUANDO CAMBIAS DE PLATAFORMA
        function actualizarOpciones() {
            const plataforma = document.getElementById('plataformaSelect').value;
            const selectAccion = document.getElementById('accionSelect');
            
            // Limpiar la lista 2
            selectAccion.innerHTML = '';

            // Rellenar la lista 2 según la plataforma elegida
            opciones[plataforma].forEach(opcion => {
                const opt = document.createElement('option');
                opt.value = opcion.valor;
                opt.textContent = opcion.texto;
                selectAccion.appendChild(opt);
            });
        }

        // Ejecutar una vez al cargar la página para que Disney tenga sus opciones por defecto
        actualizarOpciones();

        // 3. ENRUTADOR DE ACCIONES AL DAR CLIC EN "CONTINUAR"
        function ejecutarAccion() {
            const accion = document.getElementById('accionSelect').value;
            const cajaResultado = document.getElementById('cajaResultado');

            if (accion === 'acceso_disney') {
                // Llama a tu función original para Acceso
                realizarPeticion('/buscar-correo', 'Obteniendo Código de Acceso...');
            } else if (accion === 'hogar_disney') {
                // Llama a tu función original para Hogar
                realizarPeticion('/buscar-enlace-hogar', 'Buscando Código de Hogar...');
            } else if (accion === 'pass_vix') {
                // Mensaje visual sin función de backend para Vix
                cajaResultado.innerHTML = `<span style="color: #3b82f6; font-size: 14px; font-weight: 500;">Función "Cambiar contraseña" en desarrollo.</span>`;
            } else {
                // Mensaje visual para Max y Prime
                cajaResultado.innerHTML = `<span style="color: #64748b; font-size: 14px;">Plataforma en desarrollo.</span>`;
            }
        }

        // ======================================================================
        // 4. TU FUNCIÓN ORIGINAL INTACTA (Extraída de tu index - Copiar.html)
        // ======================================================================
        async function realizarPeticion(ruta, mensajeCarga) {
            const email = document.getElementById('emailInput').value;
            const cajaResultado = document.getElementById('cajaResultado');
            const modal = document.getElementById('loadingModal');
            const textoCarga = document.getElementById('textoCarga');
            
            if(!email) {
                alert("Por favor ingresa un correo electrónico válido.");
                return;
            }

            textoCarga.innerText = mensajeCarga;
            modal.classList.add('active');
            
            cajaResultado.innerHTML = '<span style="color: #64748b; font-size: 14px;">Procesando...</span>';

            try {
                // TU ENLACE BASE DE RAILWAY
                const baseUrlRailway = 'https://api-disney-bot-production.up.railway.app'; 
                
                const response = await fetch(baseUrlRailway + ruta, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email_usuario: email })
                });

                const data = await response.json();
                modal.classList.remove('active');

                if (data.success) {
                    if(data.tipo === 'codigo') {
                        cajaResultado.innerHTML = `<span class="result-text">${data.resultado}</span>`;
                    } else if (data.tipo === 'enlace') {
                        // Si es un enlace, creamos un botón verde interactivo para darle clic
                        cajaResultado.innerHTML = `
                            <span style="color: white; font-size: 14px; margin-bottom: 5px;">¡Enlace de Hogar encontrado!</span>
                            <a href="${data.resultado}" target="_blank" class="btn-enlace-final">Abrir enlace de Disney</a>
                        `;
                    } else {
                        cajaResultado.innerHTML = `<span class="result-error">${data.resultado}</span>`;
                    }
                } else {
                    cajaResultado.innerHTML = `<span class="result-error">${data.mensaje || data.error}</span>`;
                }
            } catch (error) {
                modal.classList.remove('active');
                cajaResultado.innerHTML = `<span class="result-error">Error de red. Verifica tu conexión a Railway.</span>`;
            }
        }
    </script>
</body>
</html>
